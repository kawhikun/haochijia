<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>好吃家音乐实验室</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="apple-touch-icon" href="./assets/icon-192.png">
    <link rel="stylesheet" href="./assets/styles.css">
    <link rel="stylesheet" href="./assets/music-lab.css">
  </head>
  <body class="music-lab-page">
    <div class="bg-blur blur-a"></div>
    <div class="bg-blur blur-b"></div>
    <main class="music-lab-shell">
      <section class="card music-lab-hero">
        <div class="music-lab-topbar">
          <a class="ghost-btn compact-btn" href="./index.html">← 返回好吃家核心版</a>
          <span class="top-pill subtle" id="musicLabSavedPill">本地保存</span>
        </div>
        <div class="section-head compact">
          <div>
            <p class="section-kicker">独立模块</p>
            <h1 id="musicLabTitle">好吃家音乐实验室</h1>
            <p class="fold-summary-text" id="musicLabLead">音乐已经从主文件分离出来。这里保留电子音乐风格、8 个参数微调和桥接包导出。</p>
          </div>
          <button type="button" class="primary-btn" id="musicLabToggleBtn">开启音乐</button>
        </div>
        <div class="music-lab-summary" id="musicLabSummary"></div>
        <div class="music-lab-status muted small" id="musicLabStatus">点一下开启，本地生成循环节奏。</div>
      </section>

      <section class="card music-lab-card">
        <div class="section-head compact">
          <div>
            <p class="section-kicker">流派</p>
            <h2>风格选择</h2>
          </div>
          <span class="inline-note" id="musicLabGenreCount">0 个流派</span>
        </div>
        <div class="music-lab-genre-grid" id="musicLabGenreGrid"></div>
      </section>

      <section class="card music-lab-card">
        <div class="section-head compact">
          <div>
            <p class="section-kicker">微调</p>
            <h2>8 参数控制台</h2>
          </div>
          <button type="button" class="ghost-btn compact-btn" id="musicLabExportBtn">导出桥接包</button>
        </div>
        <div class="music-lab-control-grid" id="musicLabControlGrid"></div>
        <div class="music-lab-toggle-grid">
          <label class="music-lab-check">
            <input id="musicLabPersistent" type="checkbox">
            <span>持续播放（切到后台也尽量保留）</span>
          </label>
          <label class="music-lab-check">
            <input id="musicLabAutoMorph" type="checkbox">
            <span>自动缓慢变形</span>
          </label>
        </div>
      </section>

      <section class="card music-lab-card">
        <div class="section-head compact">
          <div>
            <p class="section-kicker">当前输出</p>
            <h2>风格说明</h2>
          </div>
        </div>
        <div class="music-lab-note" id="musicLabNote"></div>
      </section>
    </main>
    <script>
      (function () {
        if (location.protocol !== 'file:') return;
        document.addEventListener('DOMContentLoaded', function () {
          document.body.innerHTML = '<main style="min-height:100vh;display:grid;place-items:center;padding:24px;font-family:ui-sans-serif,system-ui,sans-serif;background:#f8fafc;color:#0f172a;"><section style="max-width:720px;padding:24px;border-radius:24px;background:#fff;box-shadow:0 18px 40px rgba(15,23,42,.12);border:1px solid rgba(148,163,184,.2);"><h1 style="margin:0 0 12px;">请先用本地服务器打开音乐实验室</h1><p style="line-height:1.7;">当前地址是 <code>file:///</code>，模块脚本和音频能力可能无法正常加载。请回到压缩包目录，运行 <strong>start-local.command</strong>、<strong>start-local.bat</strong> 或 <strong>python3 run_local_server.py</strong>，然后再访问本页。</p><p style="margin-top:14px;"><a href="./index.html">返回核心首页</a></p></section></main>';
        });
      }());
    </script>
    <script type="module" src="./assets/music-lab.js"></script>
  </body>
</html>
