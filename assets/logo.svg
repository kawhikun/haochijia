<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Haochijia NourishNest techno logo">
  <defs>
    <linearGradient id="bg" x1="28" y1="24" x2="230" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
